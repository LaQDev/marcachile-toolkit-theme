name: Despliegue Theme a Producción (AWS)

on:
  release:
    types: [published]

jobs:
  deploy:
    name: Despliegue Seguro a AWS
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Descargar código del release
        uses: actions/checkout@v3

      - name: 🔐 Iniciar sesión en AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: 🕵️ Obtener la IP temporal del robot de GitHub
        id: ip
        run: echo "ipv4=$(curl -s https://checkip.amazonaws.com)" >> $GITHUB_OUTPUT

      - name: 🔓 Abrir puerto en el cortafuegos de AWS
        run: |
          aws ec2 authorize-security-group-ingress \
            --group-id sg-0e52c9cb39d3b7b4d \
            --protocol tcp \
            --port 22 \
            --cidr ${{ steps.ip.outputs.ipv4 }}/32

      - name: 🚀 Subir Theme a Producción
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.PROD_HOST }}
          username: github_deploy
          key: ${{ secrets.PROD_SSH_KEY }}
          source: "."
          target: "/srv/www/marcachile/toolkit/wp-content/themes/marcachile-toolkit-theme"
          exclude: ".git/**,.github/**"

      - name: 🔒 Cerrar puerto en el cortafuegos de AWS
        if: always()
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id sg-0e52c9cb39d3b7b4d \
            --protocol tcp \
            --port 22 \
            --cidr ${{ steps.ip.outputs.ipv4 }}/32