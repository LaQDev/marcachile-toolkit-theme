name: Deploy Theme to Preproduction

on:
  push:
    branches:
      - main  # Se activa cada vez que subes cambios a la rama principal

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Obtener código del repositorio
        uses: actions/checkout@v3

      - name: 🚀 Subir archivos al servidor por SFTP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SFTP_SERVER }}
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          port: 22
          source: "."
          target: "/home/dh_4wwubs/toolkitmarcachile.laq.cl/wp-content/themes/marcachile-toolkit-theme"